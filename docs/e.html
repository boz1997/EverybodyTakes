<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join event — GuestCam</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    // Single QR entry point. Guests join the event in the browser — no app
    // download. Forward the code straight to the web guest app.
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = (params.get('code') || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
      window.location.replace('app/' + (code ? ('?code=' + encodeURIComponent(code)) : ''));
    })();
  </script>
</head>
<body>
  <div class="wrap" style="text-align:center;">
    <p class="muted" style="margin-top:60px;">Opening your event…</p>
    <p class="muted" style="margin-top:12px;"><a id="manual" href="app/">Tap here if it doesn’t open</a></p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = (params.get('code') || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
      if (code) document.getElementById('manual').setAttribute('href', 'app/?code=' + encodeURIComponent(code));
    })();
  </script>
</body>
</html>
