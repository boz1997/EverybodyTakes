<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join event — GuestCam</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site">
    <a class="brand" href="index.html">Guest<span>Cam</span></a>
    <nav>
      <a href="support.html">Support</a>
    </nav>
  </header>

  <div class="wrap" style="text-align:center;">
    <h1 style="margin-top:40px;">You're invited 🎉</h1>
    <p class="muted">Open this event in the GuestCam app.</p>

    <div class="card" style="margin-top:24px;">
      <p class="muted" style="letter-spacing:2px;margin:0;font-size:13px;">EVENT CODE</p>
      <p id="code" style="font-size:40px;font-weight:800;letter-spacing:8px;margin:6px 0;">——————</p>
    </div>

    <a id="openBtn" class="btn" href="#">Open in GuestCam</a>

    <p class="muted" style="margin-top:28px;">
      Don’t have the app yet? Download GuestCam, then enter the code above to join.
    </p>

    <footer>
      <a href="privacy.html">Privacy</a> ·
      <a href="terms.html">Terms</a> ·
      <a href="support.html">Support</a>
    </footer>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = (params.get('code') || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
      if (code) document.getElementById('code').textContent = code;

      var deepLink = 'guestcam://guest/join?code=' + encodeURIComponent(code);
      var btn = document.getElementById('openBtn');
      btn.setAttribute('href', deepLink);

      // Try to open the app automatically; if it isn't installed, nothing happens
      // and the user stays on this page with the code + download guidance.
      if (code) {
        setTimeout(function () { window.location.href = deepLink; }, 400);
      }
    })();
  </script>
</body>
</html>
