<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join event — GuestCam</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site">
    <a class="brand" href="index.html">Guest<span>Cam</span></a>
    <nav><a href="support.html">Support</a></nav>
  </header>

  <div class="wrap" style="text-align:center;">
    <h1 style="margin-top:40px;">You're invited 🎉</h1>

    <div class="card" style="margin-top:20px;">
      <p class="muted" style="letter-spacing:2px;margin:0;font-size:13px;">EVENT CODE</p>
      <p id="code" style="font-size:40px;font-weight:800;letter-spacing:8px;margin:6px 0;">——————</p>
    </div>

    <p id="loading" class="muted" style="margin-top:28px;">Opening your event…</p>

    <div id="choice" style="display:none;margin-top:24px;">
      <!-- Primary: just get in. The web app works fully — add photos, see the
           gallery — with no download and no risk of a broken custom-scheme link. -->
      <a id="webBtn" class="btn" href="app/">Continue in browser</a>

      <!-- Secondary: a real App Store link (never errors). -->
      <a id="appStoreBtn" class="btn"
         style="margin-top:12px;background:transparent;border:1px solid currentColor;"
         href="https://apps.apple.com/app/id6777402204">Get the app</a>

      <!-- Opt-in: only people who already have the app tap this, so the custom
           scheme is never triggered for someone without it. Falls back to the
           store if the app doesn't open. -->
      <p style="margin-top:18px;">
        <a id="openAppLink" href="#" class="muted" style="font-size:14px;text-decoration:underline;">
          Already have the app? Open it →
        </a>
      </p>
    </div>

    <footer>
      <a href="privacy.html">Privacy</a> ·
      <a href="terms.html">Terms</a> ·
      <a href="support.html">Support</a>
    </footer>
  </div>

  <script>
    (function () {
      // Smart single-QR entry:
      //  • iPhone  → a clear, error-free choice: continue on web (primary), get
      //    the app, or — only if they already have it — open the app.
      //  • Android / desktop → straight to the web guest app.
      var APP_STORE_URL = 'https://apps.apple.com/app/id6777402204';

      var params = new URLSearchParams(window.location.search);
      var code = (params.get('code') || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
      if (code) document.getElementById('code').textContent = code;

      var web = 'app/' + (code ? '?code=' + encodeURIComponent(code) : '');
      var deep = 'guestcam://guest/join?code=' + encodeURIComponent(code);
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent)
        || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

      document.getElementById('webBtn').setAttribute('href', web);

      if (!isIOS) {
        window.location.replace(web);
        return;
      }

      // iPhone: show the choice (no auto deep-link, so no "address invalid" error).
      document.getElementById('loading').style.display = 'none';
      document.getElementById('choice').style.display = 'block';

      // Opt-in app open: try the app; if it doesn't take over within ~1.2s,
      // send them to the App Store instead.
      document.getElementById('openAppLink').addEventListener('click', function (e) {
        e.preventDefault();
        var start = Date.now();
        var fallback = setTimeout(function () {
          if (Date.now() - start < 2000) window.location.href = APP_STORE_URL;
        }, 1200);
        document.addEventListener('visibilitychange', function () {
          if (document.hidden) clearTimeout(fallback);
        });
        window.location.href = deep;
      });
    })();
  </script>
</body>
</html>
